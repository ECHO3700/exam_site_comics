<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComicVerse — Магазин комиксов</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="app-container header-inner">
            <div class="logo"><i class="fas fa-book-open"></i> ComicVerse</div>
            <div class="user-section">
                <div id="userInfoDisplay" class="user-greeting">
                    <i class="fas fa-user"></i>
                    <span id="usernameDisplay">Гость</span>
                    <span id="balanceDisplay" class="balance-badge">0 ₽</span>
                </div>
                <button id="loginLogoutBtn" class="login-btn"><i class="fas fa-sign-in-alt"></i></button>
                <button id="cartButton" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cartCounter" class="cart-badge">0</span>
                </button>
            </div>
        </div>
    </header>

    <div class="app-container main-content">
        <aside class="filters-panel">
            <div class="filter-group">
                <h4><i class="fas fa-sort-amount-down"></i> Сортировка</h4>
                <div class="sort-options">
                    <button data-sort="price-asc" class="active">Цена: по возрастанию</button>
                    <button data-sort="price-desc">Цена: по убыванию</button>
                    <button data-sort="date-desc">Новые поступления</button>
                    <button data-sort="date-asc">Старые сначала</button>
                    <button data-sort="stock-desc">По наличию (много)</button>
                </div>
            </div>
            <div class="filter-group">
                <h4>Издательство</h4>
                <select id="publisherFilter">
                    <option value="all">Все</option>
                    <option value="Marvel">Marvel</option>
                    <option value="DC">DC</option>
                    <option value="Image">Image</option>
                </select>
            </div>
            <div class="filter-group">
                <h4>Цена до (₽)</h4>
                <input type="number" id="maxPriceFilter" placeholder="Макс. цена" value="2000">
            </div>
            <button id="applyFiltersBtn" class="btn-filter">Применить фильтры</button>
        </aside>

        <section class="catalog">
            <h2><i class="fas fa-store"></i> Каталог комиксов</h2>
            <div id="productsContainer" class="products-grid"></div>
        </section>
    </div>

    <!-- Модальное окно корзины -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeCartModal">&times;</span>
            <h3><i class="fas fa-shopping-basket"></i> Корзина</h3>
            <div id="cartItemsList"></div>
            <p id="cartTotal" style="font-weight:bold; margin-top:1rem;">Итого: 0 ₽</p>
            <button id="checkoutOrderBtn" class="checkout-btn">Оформить заказ</button>
        </div>
    </div>

    <!-- Модальное окно входа -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeLoginModal">&times;</span>
            <h3>Вход в систему</h3>
            <input type="text" id="loginInput" placeholder="Логин (user1 / admin)">
            <input type="password" id="passwordInput" placeholder="Пароль (1234)">
            <button id="performLoginBtn" class="btn-login">Войти</button>
            <p style="font-size:0.8rem; margin-top:8px; color:#666;">Демо: user1 / 1234 (баланс 5000₽)</p>
        </div>
    </div>

    <footer>🦸 ComicVerse — лучшие графические истории</footer>

    <script src="script.js"></script>
</body>
</html>
